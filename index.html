<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Learning Agent</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <!-- PDF parsing (client-side) - legacy/UMD build for mobile compatibility -->
    <script
      src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js?v=1"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script>
      // Fallback loader if the CDN is blocked/cached.
      window.__ensurePdfJs = function () {
        if (window.pdfjsLib) return;
        var s = document.createElement("script");
        s.src = "https://unpkg.com/pdfjs-dist@3.11.174/legacy/build/pdf.min.js";
        s.crossOrigin = "anonymous";
        s.referrerPolicy = "no-referrer";
        document.head.appendChild(s);
      };
      window.addEventListener("load", function () {
        if (!window.pdfjsLib) window.__ensurePdfJs();
      });
    </script>
    <!-- DOCX parsing (client-side) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
    <!-- PPTX parsing helper (client-side) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" id="sidebar" aria-label="Sidebar">
        <div class="sidebar__brand">
          <div class="brand__title">AIVA CHATBOT</div>
          <button class="icon-btn icon-btn--ghost" type="button" id="sidebarToggle" aria-label="Collapse sidebar">
            <span class="emoji" aria-hidden="true">☰</span>
          </button>
        </div>

        <button class="btn btn--primary btn--wide" type="button" id="newChatBtn">
          <span class="emoji" aria-hidden="true">＋</span>
          <span>New Chat</span>
        </button>

        <div class="sidebar__section">
          <div class="sidebar__sectionTitle">History</div>
          <div class="chatList" id="chatList" role="list"></div>
        </div>

        <div class="sidebar__footer">
          <button class="btn btn--ghost btn--wide" type="button" id="exportBtn">
            <span class="emoji" aria-hidden="true">⤓</span>
            <span>Export</span>
          </button>
          <button class="btn btn--ghost btn--danger btn--wide" type="button" id="clearAllBtn">
            <span class="emoji" aria-hidden="true">🗑</span>
            <span>Clear</span>
          </button>
        </div>
      </aside>

      <main class="main" aria-label="Main">
        <header class="topbar" aria-label="Top bar">
          <button class="icon-btn icon-btn--ghost topbar__toggle" type="button" id="sidebarToggleTop" aria-label="Toggle sidebar">
            <span class="emoji" aria-hidden="true">☰</span>
          </button>

          <div class="modelPills" role="tablist" aria-label="Model">
            <button class="pillBtn is-active" type="button" data-model="model1">Model 1</button>
            <button class="pillBtn" type="button" data-model="model2">Model 2</button>
            <button class="pillBtn" type="button" data-model="model3">Model 3</button>
          </div>

          <div class="topbar__right">
            <div class="statusPill" id="statusLine">Ready</div>
            <button class="btn btn--ghost" type="button" id="settingsBtn">
              <span class="emoji" aria-hidden="true">⚙️</span>
              <span>Settings</span>
            </button>
          </div>
        </header>

        <section class="content" aria-label="Content">
          <section class="center" aria-label="Chat">
            <div class="queryBanner">
              <div class="queryBanner__title" id="activeChatTitle">New chat</div>
              <button class="icon-btn icon-btn--ghost" type="button" id="clearChatBtn" aria-label="Clear chat">
                <span class="emoji" aria-hidden="true">🧹</span>
              </button>
            </div>

            <div class="chatCard" aria-label="Conversation">
              <div class="messages" id="chatLog" role="log" aria-live="polite"></div>
              <div class="scrollFade" aria-hidden="true"></div>
            </div>

            <div class="chipsRow" aria-label="Quick actions">
              <button class="chip" type="button" data-chip="shorter">Make response shorter</button>
              <button class="chip" type="button" data-chip="simple">Explain it like I'm 5</button>
              <button class="chip" type="button" data-chip="more">Tell me more</button>
            </div>

            <footer class="composerBar" aria-label="Message composer">
              <div class="composerBar__inner">
                <button class="icon-btn icon-btn--ghost" type="button" id="attachBtn" aria-label="Attach file">
                  <span class="emoji" aria-hidden="true">＋</span>
                </button>

                <div class="composerBox">
                  <textarea
                    id="queryInput"
                    class="composerBox__input"
                    placeholder="Message AIVA…"
                    rows="1"
                  ></textarea>

                  <div class="composerBox__meta">
                    <div class="composerBox__left">
                      <label class="toggle">
                        <input type="checkbox" id="simpleToggle" />
                        <span>Explain simply</span>
                      </label>
                    </div>
                    <div class="composerBox__right" id="composerHint">Upload a file • Enter to send • Shift+Enter for newline</div>
                  </div>
                </div>

                <button class="icon-btn icon-btn--mic" type="button" id="micBtn" aria-label="Voice input">
                  <span class="emoji" aria-hidden="true">🎙️</span>
                </button>
                <button class="icon-btn icon-btn--send" type="button" id="sendBtn" aria-label="Send">
                  <span class="emoji" aria-hidden="true">▶</span>
                </button>
              </div>

              <input id="fileInput" type="file" class="fileInput" accept="*/*" />
            </footer>
          </section>

          <aside class="rightPane" aria-label="Sources">
            <div class="rightPane__title">Links to Document and Website for this Response</div>
            <div class="rightPane__body" id="sourcesPanel">
              <div class="linkItem">
                <div class="linkItem__label">Link to uploaded file</div>
                <div class="linkItem__value" id="sourceFileName">—</div>
              </div>
              <div class="linkItem">
                <div class="linkItem__label">Top matched chunks</div>
                <div class="linkItem__value" id="sourceChunks">—</div>
              </div>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <div class="modal" id="settingsModal" aria-hidden="true" role="dialog" aria-label="Settings">
      <div class="modal__backdrop" data-close="true"></div>
      <div class="modal__panel" role="document">
        <div class="modal__header">
          <div class="modal__title">Settings</div>
          <button class="icon-btn icon-btn--ghost" type="button" data-close="true" aria-label="Close">
            <span class="emoji" aria-hidden="true">✕</span>
          </button>
        </div>

        <div class="modal__body">
          <label class="field">
            <div class="field__label">Theme</div>
            <select class="field__input" id="themeSelect">
              <option value="dark" selected>Dark</option>
              <option value="light">Light</option>
            </select>
          </label>

          <div class="field">
            <div class="field__label">Voice</div>
            <div class="grid2">
              <label class="field">
                <div class="field__label">Preference (best‑effort)</div>
                <select class="field__input" id="voiceGenderSelect">
                  <option value="any" selected>Any</option>
                  <option value="female">Female</option>
                  <option value="male">Male</option>
                </select>
                <div class="field__hint">Browsers don’t reliably expose gender; this is a name-based guess.</div>
              </label>
              <label class="field">
                <div class="field__label">Voice type</div>
                <select class="field__input" id="voiceSelect"></select>
                <div class="field__hint">Voice list depends on device/browser.</div>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field__label">Speech controls</div>
            <div class="grid3">
              <label class="field">
                <div class="field__label">Speed</div>
                <input class="field__input" id="rateInput" type="range" min="0.6" max="1.6" step="0.05" value="1" />
                <div class="field__hint"><span id="rateValue">1.00</span>x</div>
              </label>
              <label class="field">
                <div class="field__label">Pitch</div>
                <input class="field__input" id="pitchInput" type="range" min="0.6" max="1.6" step="0.05" value="1" />
                <div class="field__hint"><span id="pitchValue">1.00</span></div>
              </label>
              <label class="field">
                <div class="field__label">Volume</div>
                <input class="field__input" id="volumeInput" type="range" min="0" max="1" step="0.05" value="1" />
                <div class="field__hint"><span id="volumeValue">1.00</span></div>
              </label>
            </div>
          </div>
        </div>

        <div class="modal__footer">
          <button class="btn btn--primary" type="button" id="saveSettingsBtn">Save</button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
